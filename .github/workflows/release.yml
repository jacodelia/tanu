name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            packages: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            packages: true
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            packages: true
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          name="tanu-${GITHUB_REF_NAME}-${{ matrix.target }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "$name.zip" ./target/${{ matrix.target }}/release/tanu.exe ./README.md ./LICENSE
          else
            tar czf "$name.tar.gz" -C target/${{ matrix.target }}/release tanu -C "$GITHUB_WORKSPACE" README.md LICENSE
          fi

      - name: Build .deb + .rpm
        if: matrix.packages
        run: |
          cargo install cargo-deb cargo-generate-rpm --locked
          cargo deb --no-build --target ${{ matrix.target }}
          cargo generate-rpm --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/debian/*.deb .
          mv target/${{ matrix.target }}/generate-rpm/*.rpm .

      - name: Build .msi
        if: runner.os == 'Windows'
        run: |
          cargo install cargo-wix --locked
          cargo wix init --force
          cargo wix --no-build --nocapture --target ${{ matrix.target }} --output "tanu-${env:GITHUB_REF_NAME}-${{ matrix.target }}.msi"

      # ponytail: plain hdiutil, no .app bundle — tanu is a TUI binary, not a GUI app
      - name: Build .dmg
        if: runner.os == 'macOS'
        run: |
          name="tanu-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dmg/Tanu
          cp target/${{ matrix.target }}/release/tanu README.md LICENSE dmg/Tanu/
          hdiutil create -volname Tanu -srcfolder dmg/Tanu -ov -format UDZO "$name.dmg"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
            *.deb
            *.rpm
            *.msi
            *.dmg
